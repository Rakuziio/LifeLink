{% extends 'base.html' %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/flash.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

{% block title %}
    Login
{% endblock %}

{% block content %}
    <form align="center" method="POST" action="{{ url_for('auth.login') }}">
        <h1>Login</h1>
        <label for="email">Email:</label><br>
        <input
            autocomplete="off"
            type="email"
            id="email"
            name="email"
            placeholder="Enter email"><br><br>
        <label for="password">Password:</label><br>
        <input
            autocomplete="off"
            type="password"
            id="password"
            name="password"
            placeholder="Enter password"><br><br>
        <button type="submit">
                Login
        </button><br><br>
        <p>New member? <a href="{{ url_for('auth.sign_up') }}">Sign up</a></p>
    </form>
{% endblock %}

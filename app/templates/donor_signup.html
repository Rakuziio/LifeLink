{% extends 'base.html' %}

{% block title %}
    Login
{% endblock %}

{% block content %}
    <form align="center" method="POST" action="{{ url_for('donor.become_donor') }}">
        <h1>Become a donor</h1>

        <label for="blood_type">Blood Type:</label><br>
        <select name="blood_type", id="blood_type" required>
            <option value="" disable selected>Select blood group</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
        </select><br><br>

        <label for="phone">Phone:</label><br>
        <input
            autocomplete="off"
            type="text"
            id="phone"
            name="phone"
            placeholder="Phone number"><br><br>

        <label for="gender">Gender:</label><br>
        <select name="gender", id="gender" required>
            <option value="" disable selected>Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
            <option value="prefer_not_to_say">Prefer not to say</option>
        </select><br><br>

        <label for="dob">Date of Birth: </label><br>
        <input
            type="date",
            name="dob",
            id="dob",
            required><br><br>

        <label for="state">State:</label><br>
        <input
            autocomplete="off"
            type="text"
            id="state"
            name="state"
            placeholder="State"><br><br>

        <label for="city">City:</label><br>
        <input
            autocomplete="off"
            type="text"
            id="city"
            name="city"
            placeholder="City"><br><br>

        <button type="submit">
                Submit
        </button><br><br>
    </form>
{% endblock %}

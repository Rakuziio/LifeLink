{% extends 'base.html' %}

{% block title %}
    Sign-up
{% endblock %}

{% block content %}
    <form align="center" method="post" action="{{ url_for('auth.sign_up') }}">
        <h1>Sign Up</h1>
        <label for="fullname">Full name:</label><br>
        <input
            autocomplete="off"
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Full name"><br><br>
        <label for="email">Email:</label><br>
        <input
            autocomplete="off"
            type="email"
            id="email"
            name="email"
            placeholder="Enter email"><br><br>
        <label for="password1">Password:</label><br>
        <input
            autocomplete="off"
            type="password"
            id="password1"
            name="password1"
            placeholder="Password"><br><br>
        <label for="password2">Confrim Password:</label><br>
        <input
            autocomplete="off"
            type="password"
            id="password2"
            name="password2"
            placeholder="Confirm password"><br><br>
        <button type="submit">
                Register
        </button>
        <p>Already a memnber? <a href="{{ url_for('auth.login') }}">Login</a></p>
    </form>
{% endblock %}

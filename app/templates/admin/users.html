{% extends "admin/base.html" %}

{% block content %}
<h1>Users</h1>

<form method="GET" action="{{ url_for('admin.users') }}" class="filter-bar">Filter by:

    <select name="role">
        <option value="">All Roles</option>
        <option value="user" {{ 'selected' if request.args.get('role') == 'user' else '' }}>User</option>
        <option value="blood_bank" {{ 'selected' if request.args.get('role') == 'blood_bank' else '' }}>Blood Bank</option>
    </select>

    <select name="is_verified">
        <option value="">Verification</option>
        <option value="true" {{ 'selected' if request.args.get('is_verified') == 'true' else '' }}>Verified</option>
        <option value="false" {{ 'selected' if request.args.get('is_verified') == 'false' else '' }}>Not Verified</option>
    </select>

    <select name="is_donor">
        <option value="">Donor</option>
        <option value="true" {{ 'selected' if request.args.get('is_donor') == 'true' else '' }}>Donor</option>
        <option value="false" {{ 'selected' if request.args.get('is_donor') == 'false' else '' }}>Not Donor</option>
    </select>

    <button type="submit">Apply</button>
    <a href="{{ url_for('admin.users') }}" class="reset-btn">Reset</a>
</form><br>

<table class="table">
  <tr>
    <th>Sl.No.</th>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Role</th>
    <th>is_donor</th>
    <th>is_verified</th>
    <th>Action</th>
  </tr>

  {% for u in users %}
  <tr>
    <td>{{ loop.index }}</td>
    <td>{{ u.id }}</td>
    <td>{{ u.fullname }}</td>
    <td>{{ u.email }}</td>
    <td>{{ u.role }}</td>
    <td>{{ u.is_donor }}</td>
    <td>{{ u.is_verified }}</td>
    <td>
      <!-- Delete -->
      <a href="{{ url_for('admin.delete_user', user_id=u.id) }}"
        class="btn btn-dark btn-sm"
        onclick="return confirm('Are you sure?')">🗑 Delete</a>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}

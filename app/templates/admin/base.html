<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">

    <title>Admin Panel</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        .sidebar {
            width: 220px;
            background: #111;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 10px 0;
        }

        .content {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>Admin</h2>

    <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
    <a href="{{ url_for('admin.users') }}">Users</a>
    <a href="{{ url_for('admin.donors') }}">Donors</a>
    <a href="{{ url_for('admin.bloodbanks') }}">Blood Banks</a>
    <a href="{{ url_for('admin.requests') }}">Requests</a>
    <a href="{{ url_for('admin.stock') }}">Stock</a>

    <hr>
    <a href="{{ url_for('auth.logout') }}">Logout</a>
    <hr>
    <a href="{{ url_for('home.home_page') }}">Back home</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
